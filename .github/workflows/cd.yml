name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/drone-detection-api:${{ github.sha }}

      - name: Build and push Webapp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.webapp
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/drone-detection-webapp:${{ github.sha }}

      - name: Deploy to Kubernetes
        run: |
          echo "Update k8s manifests with new image tags and apply"
          # kubectl apply -f k8s/  (requires kubeconfig setup)
