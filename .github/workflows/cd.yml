name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t drone-detection-api:${{ github.sha }} .

      - name: Build Webapp image
        run: docker build -f docker/Dockerfile.webapp -t drone-detection-webapp:${{ github.sha }} .

      - name: Deploy to Kubernetes
        run: |
          echo "Images built successfully. Deploy with:"
          echo "  kubectl apply -f k8s/"
