<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="helmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#d0e8f7"/>
    </linearGradient>
    <linearGradient id="k8sGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="monGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>

  <!-- Cluster border -->
  <rect x="10" y="10" width="1080" height="730" rx="16" fill="#f8f9fa" stroke="#326ce5" stroke-width="3" filter="url(#shadow)"/>
  <text x="550" y="42" text-anchor="middle" font-size="18" font-weight="bold" fill="#326ce5">☸ Kubernetes Cluster (Minikube / GKE Autopilot)</text>

  <!-- Helm Charts section -->
  <rect x="30" y="60" width="500" height="340" rx="12" fill="url(#helmGrad)" stroke="#2196f3" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="280" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">⎈ Helm Charts</text>

  <!-- PostgreSQL -->
  <rect x="50" y="100" width="140" height="120" rx="8" fill="white" stroke="#336791" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#336791">PostgreSQL</text>
  <text x="120" y="145" text-anchor="middle" font-size="10" fill="#555">bitnami/postgresql</text>
  <line x1="60" y1="155" x2="180" y2="155" stroke="#ddd" stroke-width="1"/>
  <text x="120" y="172" text-anchor="middle" font-size="10" fill="#333">DB: airflow</text>
  <text x="120" y="188" text-anchor="middle" font-size="10" fill="#333">DB: mlflow</text>
  <text x="120" y="208" text-anchor="middle" font-size="9" fill="#888">Port: 5432</text>

  <!-- MinIO -->
  <rect x="210" y="100" width="140" height="120" rx="8" fill="white" stroke="#c72c48" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#c72c48">MinIO</text>
  <text x="280" y="145" text-anchor="middle" font-size="10" fill="#555">minio/minio</text>
  <line x1="220" y1="155" x2="340" y2="155" stroke="#ddd" stroke-width="1"/>
  <text x="280" y="172" text-anchor="middle" font-size="10" fill="#333">Bucket: mlflow</text>
  <text x="280" y="188" text-anchor="middle" font-size="10" fill="#333">Bucket: drone-detection</text>
  <text x="280" y="208" text-anchor="middle" font-size="9" fill="#888">Port: 9000</text>

  <!-- Airflow -->
  <rect x="370" y="100" width="145" height="285" rx="8" fill="white" stroke="#017cee" stroke-width="2" filter="url(#shadow)"/>
  <text x="442" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#017cee">Airflow</text>
  <text x="442" y="143" text-anchor="middle" font-size="10" fill="#555">apache-airflow</text>
  <line x1="380" y1="152" x2="505" y2="152" stroke="#ddd" stroke-width="1"/>
  <rect x="385" y="162" width="115" height="28" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="442" y="181" text-anchor="middle" font-size="10" fill="#333">Webserver :8080</text>
  <rect x="385" y="198" width="115" height="28" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="442" y="217" text-anchor="middle" font-size="10" fill="#333">Scheduler</text>
  <rect x="385" y="234" width="115" height="28" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="442" y="253" text-anchor="middle" font-size="10" fill="#333">Triggerer</text>
  <rect x="385" y="270" width="115" height="28" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="442" y="289" text-anchor="middle" font-size="10" fill="#333">DAG Processor</text>
  <rect x="385" y="306" width="115" height="28" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="442" y="325" text-anchor="middle" font-size="10" fill="#333">StatsD</text>
  <text x="442" y="370" text-anchor="middle" font-size="9" fill="#888">3 DAGs: ingestion,</text>
  <text x="442" y="382" text-anchor="middle" font-size="9" fill="#888">train, continuous</text>

  <!-- Arrows PostgreSQL <-> Airflow -->
  <line x1="190" y1="160" x2="370" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="270" y="248" text-anchor="middle" font-size="9" fill="#666">metadata</text>

  <!-- Arrows MinIO <-> Airflow -->
  <line x1="350" y1="160" x2="370" y2="180" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- K8s Manifests section -->
  <rect x="30" y="420" width="690" height="170" rx="12" fill="url(#k8sGrad)" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="375" y="445" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">📄 Manifests K8s</text>

  <!-- MLflow -->
  <rect x="50" y="460" width="150" height="110" rx="8" fill="white" stroke="#0194e2" stroke-width="2" filter="url(#shadow)"/>
  <text x="125" y="487" text-anchor="middle" font-size="13" font-weight="bold" fill="#0194e2">MLflow</text>
  <text x="125" y="505" text-anchor="middle" font-size="10" fill="#555">Tracking + Registry</text>
  <line x1="60" y1="513" x2="190" y2="513" stroke="#ddd" stroke-width="1"/>
  <text x="125" y="530" text-anchor="middle" font-size="10" fill="#333">Deployment + Service</text>
  <rect x="75" y="540" width="100" height="22" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="125" y="556" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">LB :5000</text>

  <!-- API -->
  <rect x="220" y="460" width="150" height="110" rx="8" fill="white" stroke="#009688" stroke-width="2" filter="url(#shadow)"/>
  <text x="295" y="487" text-anchor="middle" font-size="13" font-weight="bold" fill="#009688">FastAPI</text>
  <text x="295" y="505" text-anchor="middle" font-size="10" fill="#555">/health /predict /metrics</text>
  <line x1="230" y1="513" x2="360" y2="513" stroke="#ddd" stroke-width="1"/>
  <text x="295" y="530" text-anchor="middle" font-size="10" fill="#333">best.pt embarqué</text>
  <rect x="245" y="540" width="100" height="22" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="295" y="556" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">LB :8000</text>

  <!-- Webapp -->
  <rect x="390" y="460" width="150" height="110" rx="8" fill="white" stroke="#ff5722" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="487" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff5722">Gradio</text>
  <text x="465" y="505" text-anchor="middle" font-size="10" fill="#555">Interface Web</text>
  <line x1="400" y1="513" x2="530" y2="513" stroke="#ddd" stroke-width="1"/>
  <text x="465" y="530" text-anchor="middle" font-size="10" fill="#333">→ API :8000</text>
  <rect x="415" y="540" width="100" height="22" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="465" y="556" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">LB :7860</text>

  <!-- Arrow Webapp -> API -->
  <line x1="390" y1="515" x2="370" y2="515" stroke="#ff5722" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Arrow PostgreSQL -> MLflow -->
  <line x1="120" y1="220" x2="120" y2="460" stroke="#336791" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="105" y="350" text-anchor="middle" font-size="9" fill="#336791" transform="rotate(-90,105,350)">backend store</text>

  <!-- Arrow MinIO -> MLflow -->
  <line x1="250" y1="220" x2="155" y2="460" stroke="#c72c48" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="220" y="350" text-anchor="middle" font-size="9" fill="#c72c48" transform="rotate(-90,220,350)">artefacts S3</text>

  <!-- Monitoring section -->
  <rect x="740" y="60" width="330" height="630" rx="12" fill="url(#monGrad)" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="905" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a">📊 Monitoring</text>

  <!-- Prometheus -->
  <rect x="770" y="100" width="270" height="130" rx="8" fill="white" stroke="#e6522c" stroke-width="2" filter="url(#shadow)"/>
  <text x="905" y="127" text-anchor="middle" font-size="13" font-weight="bold" fill="#e6522c">Prometheus</text>
  <text x="905" y="147" text-anchor="middle" font-size="10" fill="#555">Scrape toutes les 15s</text>
  <line x1="780" y1="157" x2="1030" y2="157" stroke="#ddd" stroke-width="1"/>
  <text x="905" y="175" text-anchor="middle" font-size="10" fill="#333">Target: API /metrics</text>
  <text x="905" y="192" text-anchor="middle" font-size="10" fill="#333">predictions_total, latency,</text>
  <text x="905" y="207" text-anchor="middle" font-size="10" fill="#333">errors, detections</text>
  <rect x="845" y="212" width="120" height="22" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="905" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">LB :9090</text>

  <!-- Grafana -->
  <rect x="770" y="260" width="270" height="120" rx="8" fill="white" stroke="#f46800" stroke-width="2" filter="url(#shadow)"/>
  <text x="905" y="287" text-anchor="middle" font-size="13" font-weight="bold" fill="#f46800">Grafana</text>
  <text x="905" y="307" text-anchor="middle" font-size="10" fill="#555">admin / admin</text>
  <line x1="780" y1="317" x2="1030" y2="317" stroke="#ddd" stroke-width="1"/>
  <text x="905" y="335" text-anchor="middle" font-size="10" fill="#333">Dashboard pré-provisionné</text>
  <text x="905" y="352" text-anchor="middle" font-size="10" fill="#333">Latence p50/p95/p99, req/s</text>
  <rect x="845" y="358" width="120" height="22" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="905" y="374" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">LB :3000</text>

  <!-- Arrow Prometheus -> Grafana -->
  <line x1="905" y1="234" x2="905" y2="260" stroke="#e6522c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Arrow API -> Prometheus -->
  <line x1="370" y1="505" x2="770" y2="165" stroke="#e6522c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="570" y="320" text-anchor="middle" font-size="9" fill="#e6522c">scrape /metrics</text>

  <!-- Legend -->
  <rect x="770" y="420" width="270" height="250" rx="8" fill="white" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
  <text x="905" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Légende</text>
  <line x1="780" y1="455" x2="1030" y2="455" stroke="#ddd" stroke-width="1"/>

  <rect x="790" y="468" width="16" height="16" rx="3" fill="#d0e8f7" stroke="#2196f3" stroke-width="1"/>
  <text x="815" y="481" font-size="10" fill="#333">Helm Charts (3)</text>

  <rect x="790" y="494" width="16" height="16" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
  <text x="815" y="507" font-size="10" fill="#333">Manifests K8s custom (4)</text>

  <rect x="790" y="520" width="16" height="16" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
  <text x="815" y="533" font-size="10" fill="#333">Monitoring (2)</text>

  <rect x="790" y="546" width="40" height="16" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="840" y="559" font-size="10" fill="#333">Service LoadBalancer</text>

  <text x="905" y="590" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">12 pods total</text>
  <text x="905" y="608" text-anchor="middle" font-size="10" fill="#555">PostgreSQL (1) + MinIO (1)</text>
  <text x="905" y="623" text-anchor="middle" font-size="10" fill="#555">Airflow (5) + MLflow (1)</text>
  <text x="905" y="638" text-anchor="middle" font-size="10" fill="#555">API (1) + Webapp (1)</text>
  <text x="905" y="653" text-anchor="middle" font-size="10" fill="#555">Prometheus (1) + Grafana (1)</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff5722"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6522c"/>
    </marker>
  </defs>
</svg>
