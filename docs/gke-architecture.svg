<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="gcpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0fe"/>
      <stop offset="100%" style="stop-color:#d2e3fc"/>
    </linearGradient>
    <linearGradient id="registryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </linearGradient>
    <linearGradient id="internetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a73e8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d652d"/>
    </marker>
  </defs>

  <!-- Google Cloud Platform border -->
  <rect x="10" y="10" width="1180" height="830" rx="18" fill="#f8f9fa" stroke="#4285f4" stroke-width="3" filter="url(#shadow)"/>
  <rect x="10" y="10" width="1180" height="45" rx="18" fill="#4285f4"/>
  <rect x="10" y="37" width="1180" height="18" fill="#4285f4"/>
  <text x="600" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="white">☁ Google Cloud Platform — Projet: gen-lang-client-0325944995</text>

  <!-- Artifact Registry -->
  <rect x="30" y="70" width="280" height="160" rx="10" fill="url(#registryGrad)" stroke="#c2185b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#880e4f">🐳 Artifact Registry</text>
  <text x="170" y="113" text-anchor="middle" font-size="10" fill="#555">europe-west1-docker.pkg.dev</text>
  <line x1="45" y1="122" x2="295" y2="122" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="50" y="132" width="240" height="28" rx="5" fill="white" stroke="#c2185b" stroke-width="1"/>
  <text x="170" y="151" text-anchor="middle" font-size="10" fill="#333">drone-detection/api:latest (2.1 GB)</text>

  <rect x="50" y="166" width="240" height="28" rx="5" fill="white" stroke="#c2185b" stroke-width="1"/>
  <text x="170" y="185" text-anchor="middle" font-size="10" fill="#333">drone-detection/webapp:latest (350 MB)</text>

  <rect x="50" y="200" width="240" height="28" rx="5" fill="white" stroke="#c2185b" stroke-width="1"/>
  <text x="170" y="219" text-anchor="middle" font-size="10" fill="#333">drone-detection/mlflow:latest (280 MB)</text>

