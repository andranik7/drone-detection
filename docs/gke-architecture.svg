  <rect x="750" y="130" width="155" height="100" rx="8" fill="white" stroke="#017cee" stroke-width="2" filter="url(#shadow)"/>
  <text x="827" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#017cee">Airflow</text>
