  <text x="560" y="504" text-anchor="middle" font-size="9" fill="#777">selon la charge</text>

  <text x="780" y="472" text-anchor="middle" font-size="11" fill="#333">🛡 Sécurité gérée</text>
  <text x="780" y="490" text-anchor="middle" font-size="9" fill="#777">Patches OS, hardening</text>
  <text x="780" y="504" text-anchor="middle" font-size="9" fill="#777">automatiques</text>

  <text x="1000" y="472" text-anchor="middle" font-size="11" fill="#333">💰 Pay-per-pod</text>
  <text x="1000" y="490" text-anchor="middle" font-size="9" fill="#777">Facturation uniquement</text>
  <text x="1000" y="504" text-anchor="middle" font-size="9" fill="#777">sur les pods actifs</text>

  <text x="560" y="540" text-anchor="middle" font-size="11" fill="#333">🌐 Load Balancers</text>
  <text x="560" y="558" text-anchor="middle" font-size="9" fill="#777">IPs publiques automatiques</text>
  <text x="560" y="572" text-anchor="middle" font-size="9" fill="#777">pour chaque Service LB</text>

  <text x="780" y="540" text-anchor="middle" font-size="11" fill="#333">💾 Persistent Volumes</text>
  <text x="780" y="558" text-anchor="middle" font-size="9" fill="#777">Disques GCE provisionnés</text>
  <text x="780" y="572" text-anchor="middle" font-size="9" fill="#777">automatiquement</text>

  <text x="1000" y="540" text-anchor="middle" font-size="11" fill="#333">📍 Région europe-west1</text>
  <text x="1000" y="558" text-anchor="middle" font-size="9" fill="#777">Belgique — faible latence</text>
  <text x="1000" y="572" text-anchor="middle" font-size="9" fill="#777">pour l'Europe</text>

